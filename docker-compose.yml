services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: qts
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d qts']
      interval: 5s
      timeout: 3s
      retries: 5

  judge0:
    image: judge0/judge0:1.13.0
    ports:
      - '2358:2358'
    volumes:
      - judge0_data:/api/db
      - judge0_logs:/api/log
    environment:
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-a-strong-secret-token}
      REDIS_URL: redis://redis:6379
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_password
    depends_on:
      redis:
        condition: service_started
      judge0-db:
        condition: service_healthy
    restart: unless-stopped

  judge0-db:
    image: postgres:15
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_password
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U judge0 -d judge0']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/qts
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JUDGE0_URL: ${JUDGE0_URL:-http://judge0:2358}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  judge0_data:
  judge0_logs:
  judge0_postgres_data:
