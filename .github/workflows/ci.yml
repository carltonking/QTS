name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://user:password@localhost:5432/qts_test

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=backend/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - run: npx eslint --no-error-on-unmatched-pattern .
      - run: npx tsc --noEmit
        working-directory: backend
      - run: npx tsc --noEmit
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: qts_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=backend/prisma/schema.prisma
      - run: npx vitest run
        working-directory: backend
      - run: npx vitest run
        working-directory: frontend

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/qts_test
      - run: npm run build
        working-directory: backend
      - run: npm run build
        working-directory: frontend
